# Minimal SyncLite configuration used by the rusqlite / duckdb / streaming samples.
#
# The samples reference this file with `SyncLiteOptions { config_path: Some("synclite.conf"), .. }`,
# so run them from this folder (or copy this file alongside the binary).

device-name=sampledevice
db-engine=sqlite
device-type=SQLITE

# Local FS staging — no remote upload, just write log batches under this directory.
device-stage-type=FS
local-data-stage-directory=./synclite-stage
